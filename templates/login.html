<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body> 
        <h1>Login Page</h1>
        <br>
        {% if error %}
        <p style="color: red;">{{ error }}</p>
        {% endif %}
        <h2> Welcome to IT Ticket manager - by Anshum </h2>
        <br>
        <div class="login-centre">  
        <form method="POST">
            <label>Username:</label>
            <input type="text" name="username" required>
            <br><br>
            <label>Password:</label>
            <input type="password" name="password" required>
            <br><br>
            <button type="submit">Login
            </button>
        </form>

        <p> If you don't have an account, pls register here. <a href="{{ url_for('register') }}">Register here</a></p>
        </div>
    </body>
</html>
