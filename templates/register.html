<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-centre">
    <div class="login-box">
    <h1>Register Page</h1>
    <br>
    {% if error %}
    <p style="color: red;">{{ error }}</p>
    {% endif %}
    <h2> Welcome to IT Ticket manager - by Anshum </h2>
    <br>
    <form method="POST">
        <label>Name:</label>
        <input type="text" name="name" required>
        <br><br>

        <label>Username:</label>
        <input type="text" name="username" required>

        <br><br>

        <label>Password:</label>
        <input type="password" name="password" required>
        <br><br>

        <button type="submit">Register</button>
    </form>
    <p> If you already have an account, then pls login here. <a href="{{ url_for('login') }}">Login here</a></p>
</body>
</div>
</div>
</html>
